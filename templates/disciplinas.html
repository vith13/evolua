{% extends "base.html" %}
{% block titulo %}Disciplinas - Evolua{% endblock %}
{% block estilos %}<link rel="stylesheet" href="{{ url_for('static', filename='css/disciplinas.css') }}">{% endblock %}
{% block classe_main %}disciplinas-main{% endblock %}

{% block conteudo %}

    <!-- HEADER -->
    <div class="disciplinas-header">
        <span>Disciplinas</span>
        <button class="btn-nova-disciplina" onclick="abrirModal()">
            <i data-lucide="plus"></i>
        </button>
    </div>

    <!-- GRID DE DISCIPLINAS -->
    <div class="disciplinas-conteudo">
        <div class="disciplinas-grid" id="disciplinas-grid"></div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal" style="display:none">
        <div class="modal">
            <h3 id="modal-titulo">Nova disciplina</h3>

            <div class="campo">
                <label>Nome</label>
                <input type="text" id="input-disciplina" placeholder="Nome da disciplina...">
            </div>

            <div class="campo">
                <label>Cor</label>
                <div class="cores-opcoes" id="cores-opcoes">
                    <div class="cor-opcao" style="background:#093952" data-cor="#093952" onclick="selecionarCor('#093952', this)"></div>
                    <div class="cor-opcao" style="background:#2E86AB" data-cor="#2E86AB" onclick="selecionarCor('#2E86AB', this)"></div>
                    <div class="cor-opcao" style="background:#4CAF82" data-cor="#4CAF82" onclick="selecionarCor('#4CAF82', this)"></div>
                    <div class="cor-opcao" style="background:#E07A5F" data-cor="#E07A5F" onclick="selecionarCor('#E07A5F', this)"></div>
                    <div class="cor-opcao" style="background:#F2CC8F" data-cor="#F2CC8F" onclick="selecionarCor('#F2CC8F', this)"></div>
                    <div class="cor-opcao" style="background:#9B5DE5" data-cor="#9B5DE5" onclick="selecionarCor('#9B5DE5', this)"></div>
                    <div class="cor-opcao" style="background:#F15BB5" data-cor="#F15BB5" onclick="selecionarCor('#F15BB5', this)"></div>
                    <div class="cor-opcao" style="background:#6B7280" data-cor="#6B7280" onclick="selecionarCor('#6B7280', this)"></div>
                </div>
            </div>

            <div class="modal-botoes">
                <button onclick="fecharModal()">Cancelar</button>
                <button class="btn-confirmar" onclick="salvarDisciplina()">Salvar</button>
            </div>
        </div>
    </div>

{% endblock %}

{% block scripts %}
<script>
    let disciplinas = JSON.parse(localStorage.getItem('disciplinas')) || [];
    let editandoIndex = null;
    let corSelecionada = '#093952';

    function salvar() {
        localStorage.setItem('disciplinas', JSON.stringify(disciplinas));
    }

    function selecionarCor(cor, el) {
        corSelecionada = cor;
        document.querySelectorAll('.cor-opcao').forEach(c => c.classList.remove('selecionada'));
        el.classList.add('selecionada');
    }

    function renderizar() {
        const grid = document.getElementById('disciplinas-grid');
        grid.innerHTML = '';

        if (disciplinas.length === 0) {
            grid.innerHTML = '<p class="vazio">Nenhuma disciplina cadastrada.</p>';
            return;
        }

        disciplinas.forEach((disciplina, index) => {
            const cor = disciplina.cor || '#093952';
            const card = document.createElement('div');
            card.className = 'disciplina-card';
            card.style.borderTop = `5px solid ${cor}`;
            card.innerHTML = `
                <div class="disciplina-cor-tag" style="background:${cor}"></div>
                <div class="disciplina-nome">${disciplina.nome}</div>
                <div class="disciplina-acoes">
                    <button class="btn-editar" onclick="abrirEdicao(${index})">
                        <i data-lucide="pencil"></i>
                    </button>
                    <button class="btn-excluir" onclick="excluirDisciplina(${index})">
                        <i data-lucide="trash-2"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });

        lucide.createIcons();
    }

    function abrirModal() {
        editandoIndex = null;
        corSelecionada = '#093952';
        document.getElementById('modal-titulo').textContent = 'Nova disciplina';
        document.getElementById('input-disciplina').value = '';
        document.querySelectorAll('.cor-opcao').forEach(c => c.classList.remove('selecionada'));
        document.querySelector('.cor-opcao[data-cor="#093952"]').classList.add('selecionada');
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('input-disciplina').focus();
    }

    function abrirEdicao(index) {
        editandoIndex = index;
        corSelecionada = disciplinas[index].cor || '#093952';
        document.getElementById('modal-titulo').textContent = 'Editar disciplina';
        document.getElementById('input-disciplina').value = disciplinas[index].nome;
        document.querySelectorAll('.cor-opcao').forEach(c => c.classList.remove('selecionada'));
        const corEl = document.querySelector(`.cor-opcao[data-cor="${corSelecionada}"]`);
        if (corEl) corEl.classList.add('selecionada');
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('input-disciplina').focus();
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('input-disciplina').value = '';
        editandoIndex = null;
    }

    function salvarDisciplina() {
        const input = document.getElementById('input-disciplina');
        const nome = input.value.trim();
        if (!nome) return;

        if (editandoIndex !== null) {
            disciplinas[editandoIndex].nome = nome;
            disciplinas[editandoIndex].cor = corSelecionada;
        } else {
            disciplinas.push({ nome, cor: corSelecionada });
        }

        salvar();
        fecharModal();
        renderizar();
    }

    function excluirDisciplina(index) {
        disciplinas.splice(index, 1);
        salvar();
        renderizar();
    }

    document.getElementById('input-disciplina').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') salvarDisciplina();
    });

    renderizar();
</script>
{% endblock %}
